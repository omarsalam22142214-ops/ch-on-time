    <style>
        /* تحويل الصفحة لمشغل فقط بدون هوامش */
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: auto;
        }

        /* شريط التحكم العلوي للمشغل */
        .player-header {
            background-color: #111;
            border-bottom: 2px solid #222;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .admin-btn {
            background-color: #f39c12;
            color: #000;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap; 
        }

        .nav-btn, .rotate-btn, .adblock-btn, .close-top-btn, .external-top-btn, .copy-top-btn {
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn { background-color: #3498db; }
        .nav-btn:hover { background-color: #2980b9; }
        .rotate-btn { background-color: #9b59b6; }
        .rotate-btn:hover { background-color: #8e44ad; }
        .close-top-btn { background-color: #c0392b; }
        .close-top-btn:hover { background-color: #e74c3c; }
        .external-top-btn { background-color: #8e44ad; }
        .external-top-btn:hover { background-color: #9b59b6; }
        .copy-top-btn { background-color: #f39c12; color: #000; }
        .copy-top-btn:hover { background-color: #e67e22; color: white; }
        .adblock-btn { background-color: #27ae60; }
        .adblock-btn.disabled { background-color: #c0392b; }

        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
        }
        
        .tabs-container::-webkit-scrollbar { height: 6px; }
        .tabs-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .tab-btn {
            background-color: #008b8b;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .tab-btn.active {
            background-color: #27ae60 !important;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.8);
        }

        .tab-btn.selected-channel {
            background-color: #8e44ad !important;
            border: 2px dashed #f1c40f;
            box-shadow: 0 0 10px rgba(142, 68, 173, 0.8);
            transform: scale(0.95);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 60vh;
            background-color: #000;
        }

        .video-wrapper.rotated iframe,
        .video-wrapper.rotated video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: calc(100vh - 75px);
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
        }

        /* إخفاء المشغلات افتراضياً حتى يتم الاختيار */
        #iframePlayer, #videoPlayer {
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #444;
            color: white;
        }

        .bulk-modal-content {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            border: 2px solid #3498db;
            color: white;
            text-align: center;
        }

        .bulk-textarea {
            width: 100%;
            height: 250px;
            background-color: #0d0d0d;
            color: #2ecc71;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 10px;
            direction: ltr;
            text-align: left;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .bulk-textarea:focus { outline: none; border-color: #3498db; }

        .bulk-btn-group { display: flex; gap: 15px; justify-content: space-between; }
        .bulk-save-btn { flex: 1; background-color: #27ae60; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .bulk-save-btn:hover { background-color: #2ecc71; }
        .bulk-cancel-btn { flex: 1; background-color: #e74c3c; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .bulk-cancel-btn:hover { background-color: #c0392b; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px;}
        .form-group input, .form-group select {
            width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #555;
            background-color: #333; color: white; box-sizing: border-box;
        }

        .modal-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        
        .save-btn { background-color: #27ae60; } 
        .delete-btn-modal { background-color: #e74c3c; } 
        .close-btn { background-color: #7f8c8d; } 
        
        .export-section {
            border-top: 1px solid #444;
            padding-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-channel-btn { background-color: #d35400; color: white; width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .download-btn { background-color: #2980b9; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .copy-btn { background-color: #8e44ad; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .selection-bar {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1a1a1a;
            border: 2px solid #f39c12;
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: bottom 0.3s ease-in-out;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.8);
            flex-wrap: wrap;
            min-width: 60%;
        }

        .selection-bar.active { bottom: 20px; }
        .selection-bar span { font-weight: bold; font-size: 15px; margin-left: 10px; color: white; }
        .select-all-label { cursor: pointer; display: flex; align-items: center; gap: 5px; background: #8e44ad; padding: 6px 12px; border-radius: 5px; font-weight: bold; }
        .s-btn { padding: 6px 12px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .s-dup-btn { background-color: #f1c40f; color: black; }
        .s-link-btn { background-color: #2980b9; }
        .s-code-btn { background-color: #2ecc71; }
        .s-del-btn { background-color: #e74c3c; }
        .s-close-btn { background-color: #c0392b; border: 1px solid #ff7675; }

        /* ستايل زر إخفاء وإظهار الشريط الجديد */

            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .toggle-header-btn:hover { background-color: #2c3e50; }

    <script>
        let isSelectionMode = false;
        let autoSkipTimer = null; 
        let autoSwitchInterval = null; 
        let activeLinkType = 'iframe'; // تتبع نوع المشغل الحالي

        // الدالة الجديدة الخاصة بزر الإخفاء والإظهار
        function toggleHeaderVisibility() {
            let header = document.getElementById('mainPlayerHeader');
            let btn = document.getElementById('toggleHeaderBtn');
            if (header.style.display === 'none') {
                header.style.display = 'flex';
                btn.innerText = 'إخفاء الشريط 🔼';
            } else {
                header.style.display = 'none';
                btn.innerText = 'إظهار الشريط 🔽';
            }
        }

        function toggleAutoSwitch() {
            let btn = document.getElementById('autoSwitchBtn');
            if (autoSwitchInterval) {
                clearInterval(autoSwitchInterval);
                autoSwitchInterval = null;
                btn.style.backgroundColor = '#e67e22'; 
                btn.innerText = 'تقليب تلقائي ⏱️';
            } else {
                autoSwitchInterval = setInterval(() => { nextStream(); }, 20000); 
                btn.style.backgroundColor = '#27ae60'; 
                btn.innerText = 'التقليب شغال ⏱️';
            }
        }

        function toggleSelectionMode() {
            isSelectionMode = !isSelectionMode;
            let bar = document.getElementById('selectionBar');
            let selectBtn = document.getElementById('selectModeBtn');

            if (isSelectionMode) {
                bar.classList.add('active');
                selectBtn.style.backgroundColor = '#e74c3c';
                selectBtn.innerText = 'إلغاء وضع التحديد';
            } else {
                bar.classList.remove('active');
                selectBtn.style.backgroundColor = '#8e44ad';
                selectBtn.innerText = '☑️ تحديد القنوات';
                document.querySelectorAll('.tab-btn.selected-channel').forEach(b => b.classList.remove('selected-channel'));
                document.getElementById('selectAllCheckbox').checked = false;
                updateSelectionCount();
            }
        }

        function updateSelectionCount() {
            let count = document.querySelectorAll('#mainTabs .tab-btn.selected-channel').length;
            document.getElementById('selectionCount').innerText = `تم تحديد ${count} قناة`;
        }

        function toggleSelectAll() {
            let isChecked = document.getElementById('selectAllCheckbox').checked;
            let buttons = document.querySelectorAll('#mainTabs .tab-btn:not(#autoFetchBtn)'); 
            buttons.forEach(btn => { isChecked ? btn.classList.add('selected-channel') : btn.classList.remove('selected-channel'); });
            updateSelectionCount();
        }

        function deleteSelected() {
            let selected = document.querySelectorAll('#mainTabs .tab-btn.selected-channel');
            if (selected.length === 0) { alert("يا باشا حدد قنوات الأول عشان تحذفها!"); return; }
            if(confirm(`متأكد إنك عايز تحذف ${selected.length} قناة؟`)) {
                selected.forEach(btn => {
                    if (btn.classList.contains('active')) closePlayer();
                    btn.remove();
                });
                populateSelectMenu();
                updateSelectionCount();
                document.getElementById('selectAllCheckbox').checked = false;
            }
        }

        function copySelectedLinks() {
            let selected = document.querySelectorAll('#mainTabs .tab-btn.selected-channel');
            if (selected.length === 0) { alert("حدد قنوات الأول!"); return; }
            let links = Array.from(selected).map(btn => btn.getAttribute('data-link')).join('\n');
            triggerCopy(links, "تم نسخ الروابط المحددة بنجاح! 🔗");
        }

        function copySelectedCodes() {
            let selected = document.querySelectorAll('#mainTabs .tab-btn.selected-channel');
            if (selected.length === 0) { alert("حدد قنوات الأول!"); return; }
            let codes = Array.from(selected).map(btn => {
                let clone = btn.cloneNode(true);
                clone.classList.remove('selected-channel'); 
                return clone.outerHTML;
            }).join('\n');
            triggerCopy(codes, "تم نسخ أكواد القنوات المحددة بنجاح! 📄");
        }

        function duplicateSelected() {
            let selected = document.querySelectorAll('#mainTabs .tab-btn.selected-channel');
            if (selected.length === 0) { alert("حدد قنوات الأول عشان تكررها!"); return; }
            let container = document.getElementById('mainTabs');
            let timestamp = new Date().getTime();
            selected.forEach((btn, index) => {
                let clone = btn.cloneNode(true);
                clone.id = "btn_dup_" + timestamp + "_" + index;
                clone.classList.remove('selected-channel', 'active');
                container.appendChild(clone);
            });
            populateSelectMenu();
            alert(`تم تكرار ${selected.length} قناة بنجاح! 📑`);
        }

        function openBulkEditModal() {
            let textarea = document.getElementById('bulkCodeTextarea');
            let channelsHTML = '';
            document.querySelectorAll('#mainTabs .tab-btn:not(#autoFetchBtn)').forEach(btn => {
                let clone = btn.cloneNode(true);
                clone.classList.remove('selected-channel', 'active');
                channelsHTML += clone.outerHTML + '\n';
            });
            textarea.value = channelsHTML;
            document.getElementById('bulkEditModal').style.display = 'flex';
        }

        function closeBulkEditModal() { document.getElementById('bulkEditModal').style.display = 'none'; }

        function saveBulkEdit() {
            let newHTML = document.getElementById('bulkCodeTextarea').value;
            let mainTabs = document.getElementById('mainTabs');
            let autoFetchBtn = document.getElementById('autoFetchBtn');
            mainTabs.innerHTML = '';
            if (autoFetchBtn) mainTabs.appendChild(autoFetchBtn);
            mainTabs.insertAdjacentHTML('beforeend', newHTML);
            closeBulkEditModal();
            populateSelectMenu();
            updateSelectionCount();
            if(!document.querySelector('#mainTabs .tab-btn.active')) closePlayer();
            alert("تم بناء القنوات بنجاح! ✅");
        }

        function triggerCopy(text, successMsg) {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); alert(successMsg); } 
            catch (err) { alert("عذراً، المتصفح رفض النسخ."); }
            document.body.removeChild(textArea);
        }

        function populateSelectMenu() {
            const selectMenu = document.getElementById('buttonSelect');
            selectMenu.innerHTML = ''; 
            document.querySelectorAll('#mainTabs .tab-btn:not(#autoFetchBtn)').forEach(btn => {
                let opt = document.createElement('option');
                opt.value = btn.id;
                opt.innerText = btn.innerText;
                selectMenu.appendChild(opt);
            });
        }
        
        window.onload = function() {
            populateSelectMenu();
            let firstBtn = document.querySelector('#mainTabs .tab-btn:not(#autoFetchBtn)');
            if(firstBtn) playStream(firstBtn);
        };

        let adblockEnabled = true;
        function toggleAdBlock() {
            let iframe = document.getElementById('iframePlayer');
            let btn = document.getElementById('adblockBtn');
            adblockEnabled = !adblockEnabled;
            
            if (adblockEnabled) {
                iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
                btn.innerText = '🛡️ المانع (شغال)';
                btn.classList.remove('disabled');
            } else {
                iframe.removeAttribute('sandbox');
                btn.innerText = '🛡️ المانع (مقفول)';
                btn.classList.add('disabled');
            }
            
            if(activeLinkType === 'iframe') {
                let currentSrc = iframe.src;
                if(currentSrc && currentSrc !== window.location.href) iframe.src = currentSrc;
            }
        }

        // الدالة المعدلة الذكية للاختيار بين Iframe و Video HLS
        function playStream(btnElement) {
            if (isSelectionMode && btnElement.id !== 'autoFetchBtn') {
                btnElement.classList.toggle('selected-channel');
                updateSelectionCount();
                return; 
            }

            let link = btnElement.getAttribute('data-link');
            let target = btnElement.getAttribute('data-open') || 'internal'; 

            if(!link) return;

            if (target === 'external') {
                window.open(link, '_blank');
                return; 
            }

            let iframe = document.getElementById('iframePlayer');
            let video = document.getElementById('videoPlayer');

            // إيقاف أي مشغل شغال حالياً
            iframe.src = "";
            video.pause();
            video.removeAttribute('src');
            video.load();
            if (window.hls) window.hls.destroy();

            // فحص نوع الرابط
            if (link.includes('.m3u8') || link.includes('.mp4')) {
                // استخدام مشغل HLS للروابط المباشرة
                activeLinkType = 'video';
                iframe.style.display = 'none';
                video.style.display = 'block';

                if (Hls.isSupported() && link.includes('.m3u8')) {
                    window.hls = new Hls();
                    window.hls.loadSource(link);
                    window.hls.attachMedia(video);
                    window.hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(e => console.log("المتصفح منع التشغيل التلقائي"));
                    });
                } else {
                    video.src = link;
                    video.play().catch(e => console.log("المتصفح منع التشغيل التلقائي"));
                }
            } else {
                // استخدام Iframe لصفحات الويب العادية
                activeLinkType = 'iframe';
                video.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = link;
            }

            document.getElementById('closeVid').style.display = 'inline-block';
            document.getElementById('externalVid').style.display = 'inline-block';
            document.getElementById('copyLinkBtn').style.display = 'inline-block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function closePlayer() {
            let iframe = document.getElementById('iframePlayer');
            let video = document.getElementById('videoPlayer');
            
            iframe.src = "";
            iframe.style.display = 'none';
            
            video.pause();
            video.removeAttribute('src');
            video.load();
            video.style.display = 'none';
            if (window.hls) window.hls.destroy();
            
            document.getElementById('closeVid').style.display = 'none';
            document.getElementById('externalVid').style.display = 'none';
            document.getElementById('copyLinkBtn').style.display = 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        function openExternal() {
            let activeBtn = document.querySelector('.tab-btn.active');
            if (activeBtn) { window.open(activeBtn.getAttribute('data-link'), '_blank'); } 
            else { alert("مفيش بث شغال حالياً!"); }
        }

        function copyCurrentLink() {
            let activeBtn = document.querySelector('.tab-btn.active');
            if (activeBtn) { triggerCopy(activeBtn.getAttribute('data-link'), "تم نسخ رابط القناة بنجاح!"); }
        }

        function openModal() {
            populateSelectMenu(); 
            document.getElementById('settingsModal').style.display = 'flex';
            loadButtonData();
        }

        function closeModal() { document.getElementById('settingsModal').style.display = 'none'; }

        function loadButtonData() {
            let id = document.getElementById('buttonSelect').value;
            if(!id) return;
            let btn = document.getElementById(id);
            if(btn) {
                document.getElementById('editName').value = btn.innerText;
                document.getElementById('editLink').value = btn.getAttribute('data-link');
                document.getElementById('editOpenTarget').value = btn.getAttribute('data-open') || 'internal';
            }
        }

        function applyChanges() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            if(!btn) return;
            
            btn.innerText = document.getElementById('editName').value;
            btn.setAttribute('data-link', document.getElementById('editLink').value);
            btn.setAttribute('data-open', document.getElementById('editOpenTarget').value);
            
            populateSelectMenu();
            
            if (btn.classList.contains('active') && !isSelectionMode) {
                if (document.getElementById('editOpenTarget').value === 'external') { closePlayer(); } 
                else { playStream(btn); }
            }
            alert("تم التعديل!");
        }

        function deleteChannel() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            if(btn && confirm("حذف القناة؟")) {
                if(btn.classList.contains('active')) closePlayer();
                btn.remove();
                populateSelectMenu();
                alert("تم الحذف!");
            }
        }

        function addNewChannel() {
            let inputLinks = prompt("حط اللينكات هنا (كل لينك في سطر أو بينهم مسافة):");
            if (!inputLinks) return;
            let linksArray = inputLinks.split(/[\s,\n]+/).filter(l => l.trim() !== "");
            let baseName = prompt("الاسم الأساسي للقنوات:", "قناة جديدة");
            let timestamp = new Date().getTime();
            
            linksArray.forEach((link, index) => {
                let newBtn = document.createElement("button");
                newBtn.id = "btn_new_" + timestamp + "_" + index;
                newBtn.className = "tab-btn";
                newBtn.setAttribute("data-link", link);
                newBtn.setAttribute("data-open", "internal"); 
                newBtn.innerText = linksArray.length > 1 ? `${baseName} ${index + 1}` : baseName;
                newBtn.setAttribute("onclick", "playStream(this)");
                document.getElementById("mainTabs").appendChild(newBtn);
            });
            populateSelectMenu();
        }

        function downloadFullFile() {
            closeModal(); 
            let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            let blob = new Blob([content], { type: 'text/html' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_player.html';
            a.click();
        }

        function copyFullCode() {
            closeModal();
            let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            triggerCopy(content, "تم نسخ الكود بالكامل بنجاح! ✅");
        }

        function nextStream() {
            let tabs = Array.from(document.querySelectorAll('#mainTabs .tab-btn:not(#autoFetchBtn)'));
            if(tabs.length === 0) return;
            let activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
            let nextIndex = (activeIndex + 1) % tabs.length; 
            playStream(tabs[nextIndex]);
            tabs[nextIndex].scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function prevStream() {
            let tabs = Array.from(document.querySelectorAll('#mainTabs .tab-btn:not(#autoFetchBtn)'));
            if(tabs.length === 0) return;
            let activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
            let prevIndex = (activeIndex - 1 + tabs.length) % tabs.length; 
            playStream(tabs[prevIndex]);
            tabs[prevIndex].scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function toggleRotation() { document.querySelector('.video-wrapper').classList.toggle('rotated'); }
    </script>
